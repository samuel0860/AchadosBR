name: achados_br
description: "AchadosBR - Melhores promoções e cupons do Brasil"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI & Design
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.20.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/stores/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0A14"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
